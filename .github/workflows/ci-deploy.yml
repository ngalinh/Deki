name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node --check server/index.js

  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.140.249.232
          username: vmadmin
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            sudo docker exec dashboard-bot-platform-1 bash -c '
              cd /app/data/bots/4b146b5d9fa4ff70 &&
              git fetch origin main && git reset --hard origin/main &&
              npm ci --omit=dev &&
              pm2 delete 4b146b5d9fa4ff70 2>/dev/null; true &&
              pm2 restart bot-4b146b5d9fa4ff70 &&
              pm2 save
            '
